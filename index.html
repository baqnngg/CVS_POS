<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>편의점 POS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; }
  header { background: #1a73e8; color: #fff; padding: 16px 24px; font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  header span { font-size: 1.5rem; }
  .layout { display: grid; grid-template-columns: 1fr 340px; gap: 16px; padding: 16px; max-width: 1200px; margin: 0 auto; }
  .panel { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .tab { padding: 8px 16px; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; font-size: .875rem; background: #fff; transition: all .15s; }
  .tab.active, .tab:hover { background: #1a73e8; color: #fff; border-color: #1a73e8; }
  .section { display: none; }
  .section.active { display: block; }
  h2 { font-size: 1rem; font-weight: 600; margin-bottom: 14px; color: #444; }
  table { width: 100%; border-collapse: collapse; font-size: .875rem; }
  th { background: #f8f9fa; padding: 10px 12px; text-align: left; color: #555; border-bottom: 2px solid #e0e0e0; }
  td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
  tr:hover td { background: #fafbff; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: .75rem; }
  .badge-ok { background: #e8f5e9; color: #2e7d32; }
  .badge-low { background: #fdecea; color: #c62828; }
  .form-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; align-items: flex-end; }
  .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 120px; }
  label { font-size: .8rem; color: #666; }
  input, select { padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: .875rem; outline: none; }
  input:focus, select:focus { border-color: #1a73e8; }
  .btn { padding: 8px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: .875rem; font-weight: 600; transition: background .15s; }
  .btn-primary { background: #1a73e8; color: #fff; }
  .btn-primary:hover { background: #1558b0; }
  .btn-danger { background: #e53935; color: #fff; }
  .btn-danger:hover { background: #b71c1c; }
  .btn-green { background: #43a047; color: #fff; }
  .btn-green:hover { background: #2e7d32; }
  .btn-sm { padding: 4px 10px; font-size: .8rem; }
  .msg { padding: 10px 14px; border-radius: 8px; font-size: .875rem; margin-top: 10px; }
  .msg-ok { background: #e8f5e9; color: #2e7d32; }
  .msg-err { background: #fdecea; color: #c62828; }

  /* 영수증 */
  .receipt-box { font-family: monospace; font-size: .875rem; background: #fff9f0; border: 2px dashed #ccc; border-radius: 8px; padding: 16px; white-space: pre; line-height: 1.6; }

  /* 사이드바 - 장바구니 */
  .sidebar h2 { font-size: 1rem; font-weight: 700; margin-bottom: 14px; }
  .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: .875rem; }
  .cart-total { font-weight: 700; font-size: 1rem; margin-top: 12px; text-align: right; }
  .cart-actions { display: flex; gap: 8px; margin-top: 12px; }
  .cart-add { display: flex; gap: 6px; margin-bottom: 12px; }
  .cart-add input { flex: 1; }
  .cart-add input.qty { width: 60px; flex: none; }

  /* 리포트 카드 */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .stat-card { background: #f8f9fa; border-radius: 10px; padding: 14px; text-align: center; }
  .stat-card .val { font-size: 1.3rem; font-weight: 700; color: #1a73e8; }
  .stat-card .lbl { font-size: .78rem; color: #888; margin-top: 4px; }
</style>
</head>
<body>
<header><span>🏪</span> 편의점 POS 시스템</header>

<div class="layout">
  <!-- 메인 패널 -->
  <div class="panel">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('inventory')">재고 현황</button>
      <button class="tab" onclick="switchTab('register')">상품 등록</button>
      <button class="tab" onclick="switchTab('addstock')">재고 추가</button>
      <button class="tab" onclick="switchTab('report')">매출 리포트</button>
    </div>

    <!-- 재고 현황 -->
    <div id="tab-inventory" class="section active">
      <h2>재고 현황</h2>
      <table id="inv-table">
        <thead><tr><th>상품명</th><th>카테고리</th><th>가격</th><th>재고</th><th>판매량</th><th>상태</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <!-- 상품 등록 -->
    <div id="tab-register" class="section">
      <h2>상품 등록</h2>
      <div class="form-row">
        <div class="form-group"><label>상품명</label><input id="reg-name" placeholder="예: 삼각김밥"></div>
        <div class="form-group"><label>카테고리</label><input id="reg-cat" placeholder="예: 식품"></div>
        <div class="form-group"><label>가격(원)</label><input id="reg-price" type="number" placeholder="1500"></div>
        <div class="form-group"><label>초기 재고</label><input id="reg-stock" type="number" placeholder="50"></div>
        <div class="form-group" style="justify-content:flex-end"><button class="btn btn-primary" onclick="registerProduct()">등록</button></div>
      </div>
      <div id="reg-msg"></div>
    </div>

    <!-- 재고 추가 -->
    <div id="tab-addstock" class="section">
      <h2>재고 추가</h2>
      <div class="form-row">
        <div class="form-group"><label>상품명</label>
          <select id="stock-name"><option value="">상품 선택</option></select>
        </div>
        <div class="form-group"><label>추가 수량</label><input id="stock-qty" type="number" placeholder="10" min="1"></div>
        <div class="form-group" style="justify-content:flex-end"><button class="btn btn-green" onclick="addStock()">추가</button></div>
      </div>
      <div id="stock-msg"></div>
    </div>

    <!-- 매출 리포트 -->
    <div id="tab-report" class="section">
      <h2>매출 리포트</h2>
      <div class="stat-grid" id="stat-grid"></div>
      <h2>카테고리별 매출</h2>
      <table id="cat-table"><thead><tr><th>카테고리</th><th>매출</th></tr></thead><tbody></tbody></table>
      <div style="margin-top:16px;display:flex;gap:8px">
        <button class="btn btn-primary" onclick="loadReport()">새로고침</button>
        <button class="btn btn-danger" onclick="resetSold()">판매량 초기화</button>
      </div>
      <div id="report-msg"></div>
    </div>
  </div>

  <!-- 사이드바: 장바구니 -->
  <div class="panel sidebar">
    <h2>🛒 장바구니</h2>
    <div class="cart-add">
      <select id="cart-name" style="flex:1"><option value="">상품 선택</option></select>
      <input class="qty" id="cart-qty" type="number" value="1" min="1">
      <button class="btn btn-primary btn-sm" onclick="addToCart()">추가</button>
    </div>
    <div id="cart-list"></div>
    <div class="cart-total" id="cart-total"></div>
    <div class="cart-actions">
      <button class="btn btn-green" style="flex:1" onclick="checkout()">결제</button>
      <button class="btn btn-danger btn-sm" onclick="clearCart()">비우기</button>
    </div>
    <div id="receipt-area" style="margin-top:14px"></div>
  </div>
</div>

<script>
let inventory = {};
let cart = [];

async function api(method, path, body) {
  const res = await fetch(path, { method, headers: {'Content-Type':'application/json'}, body: body ? JSON.stringify(body) : undefined });
  return res.json();
}

async function loadInventory() {
  inventory = await api('GET', '/api/inventory');
  renderInventoryTable();
  renderSelects();
}

function renderInventoryTable() {
  const tbody = document.querySelector('#inv-table tbody');
  tbody.innerHTML = '';
  for (const p of Object.values(inventory)) {
    const low = p.stock <= 5;
    tbody.innerHTML += `<tr>
      <td>${p.name}</td><td>${p.category}</td>
      <td>${p.price.toLocaleString()}원</td>
      <td><b>${p.stock}</b></td>
      <td>${p.sold}</td>
      <td><span class="badge ${low ? 'badge-low' : 'badge-ok'}">${low ? '부족' : '정상'}</span></td>
      <td><button class="btn btn-primary btn-sm" onclick="quickAdd('${p.name}')">담기</button></td>
    </tr>`;
  }
}

function renderSelects() {
  const names = Object.keys(inventory);
  ['cart-name','stock-name'].forEach(id => {
    const el = document.getElementById(id);
    const first = el.options[0].outerHTML;
    el.innerHTML = first + names.map(n => `<option value="${n}">${n}</option>`).join('');
  });
}

function switchTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'report') loadReport();
  if (name === 'inventory') loadInventory();
}

async function registerProduct() {
  const name = document.getElementById('reg-name').value.trim();
  const cat = document.getElementById('reg-cat').value.trim();
  const price = document.getElementById('reg-price').value;
  const stock = document.getElementById('reg-stock').value;
  if (!name || !cat || !price || !stock) { showMsg('reg-msg', '모든 항목을 입력해주세요.', false); return; }
  const r = await api('POST', '/api/product', {name, category: cat, price, stock});
  showMsg('reg-msg', r.message, r.ok);
  if (r.ok) { loadInventory(); ['reg-name','reg-cat','reg-price','reg-stock'].forEach(id => document.getElementById(id).value = ''); }
}

async function addStock() {
  const name = document.getElementById('stock-name').value;
  const qty = document.getElementById('stock-qty').value;
  if (!name || !qty) { showMsg('stock-msg', '상품과 수량을 선택해주세요.', false); return; }
  const r = await api('PATCH', '/api/stock', {name, quantity: qty});
  showMsg('stock-msg', r.message, r.ok);
  if (r.ok) loadInventory();
}

function quickAdd(name) { document.getElementById('cart-name').value = name; addToCart(); }

function addToCart() {
  const name = document.getElementById('cart-name').value;
  const qty = parseInt(document.getElementById('cart-qty').value) || 1;
  if (!name) return;
  const existing = cart.find(i => i.name === name);
  if (existing) existing.quantity += qty;
  else cart.push({name, quantity: qty});
  renderCart();
}

function removeFromCart(name) { cart = cart.filter(i => i.name !== name); renderCart(); }
function clearCart() { cart = []; renderCart(); document.getElementById('receipt-area').innerHTML = ''; }

function renderCart() {
  const el = document.getElementById('cart-list');
  if (!cart.length) { el.innerHTML = '<p style="color:#aaa;font-size:.85rem;padding:8px 0">장바구니가 비어있습니다.</p>'; document.getElementById('cart-total').textContent = ''; return; }
  let total = 0;
  el.innerHTML = cart.map(i => {
    const p = inventory[i.name];
    const sub = p ? p.price * i.quantity : 0;
    total += sub;
    return `<div class="cart-item">
      <span>${i.name} x${i.quantity}</span>
      <span style="display:flex;gap:8px;align-items:center">${sub.toLocaleString()}원 <button class="btn btn-danger btn-sm" onclick="removeFromCart('${i.name}')">✕</button></span>
    </div>`;
  }).join('');
  document.getElementById('cart-total').textContent = `합계: ${total.toLocaleString()}원`;
}

async function checkout() {
  if (!cart.length) return;
  const r = await api('POST', '/api/sell', {cart});
  if (r.ok) {
    renderReceipt(r.receipt);
    cart = [];
    renderCart();
    loadInventory();
  }
}

function renderReceipt(rc) {
  const w = 32;
  const line = '='.repeat(w);
  const dash = '-'.repeat(w);
  let txt = line + '\n' + '       편의점 영수증'.padEnd(w) + '\n' + dash + '\n';
  for (const item of rc.items) {
    const name = item.name.substring(0, 12).padEnd(12);
    const amt = (item.price * item.quantity).toLocaleString() + '원';
    txt += `  ${name} x${item.quantity}  ${amt}\n`;
  }
  if (rc.out_of_stock.length) {
    txt += dash + '\n  [재고 부족 - 미처리 항목]\n';
    rc.out_of_stock.forEach(n => txt += `  ${n.substring(0,12).padEnd(12)}  재고 부족\n`);
  }
  txt += dash + '\n';
  txt += `  ${'공급가액'.padEnd(14)} ${rc.supply.toLocaleString()}원\n`;
  txt += `  ${'부가세(10%)'.padEnd(13)} ${rc.vat.toLocaleString()}원\n`;
  txt += `  ${'총 결제금액'.padEnd(13)} ${rc.total.toLocaleString()}원\n`;
  txt += line + '\n    감사합니다! 또 방문해주세요 :)\n' + line;
  document.getElementById('receipt-area').innerHTML = `<div class="receipt-box">${txt}</div>`;
}

async function loadReport() {
  const r = await api('GET', '/api/report');
  document.getElementById('stat-grid').innerHTML = `
    <div class="stat-card"><div class="val">${r.daily_total.toLocaleString()}원</div><div class="lbl">일일 총 매출</div></div>
    <div class="stat-card"><div class="val">${r.best_seller ? r.best_seller.name : '-'}</div><div class="lbl">베스트셀러 (${r.best_seller ? r.best_seller.sold + '개' : ''})</div></div>
    <div class="stat-card"><div class="val">${r.low_stock.length}</div><div class="lbl">재고 부족 상품</div></div>
    <div class="stat-card"><div class="val">${Object.keys(r.by_category).length}</div><div class="lbl">카테고리 수</div></div>`;
  const tbody = document.querySelector('#cat-table tbody');
  tbody.innerHTML = Object.entries(r.by_category).map(([cat, sales]) =>
    `<tr><td>${cat}</td><td>${sales.toLocaleString()}원</td></tr>`).join('') || '<tr><td colspan="2" style="color:#aaa">데이터 없음</td></tr>';
}

async function resetSold() {
  if (!confirm('판매량을 초기화하시겠습니까?')) return;
  const r = await api('POST', '/api/reset-sold');
  showMsg('report-msg', r.message, r.ok);
  if (r.ok) { loadReport(); loadInventory(); }
}

function showMsg(id, text, ok) {
  const el = document.getElementById(id);
  el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err');
  el.textContent = text;
  setTimeout(() => el.textContent = '', 3000);
}

loadInventory();
</script>
</body>
</html>
